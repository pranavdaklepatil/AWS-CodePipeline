# Generate secure password
resource "random_password" "docdb_password" {
  length           = 32
  special          = true
  override_special = "!#$%&*()-_=+[]{}<>:?"
}

# AWS Secrets Manager - DocumentDB credentials
resource "aws_secretsmanager_secret" "docdb" {
  name                    = "${var.project_name}/docdb/credentials"
  description             = "DocumentDB credentials for ${var.project_name}"
  recovery_window_in_days = 0

  tags = {
    Name        = "${var.project_name}-docdb-secret"
    Environment = var.environment
  }
}

resource "aws_secretsmanager_secret_version" "docdb" {
  secret_id = aws_secretsmanager_secret.docdb.id

  secret_string = jsonencode({
    username = "medgridadmin"
    password = random_password.docdb_password.result
    host     = aws_docdb_cluster.main.endpoint
    port     = 27017
    dbname   = "medgrid"

    uri = "mongodb://medgridadmin:${random_password.docdb_password.result}@${aws_docdb_cluster.main.endpoint}:27017/medgrid?tls=true&replicaSet=rs0&readPreference=secondaryPreferred"
  })
}