apiVersion: v1
kind: Service
metadata:
  name: {{ include "medgrid-chart.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
  type: {{ .Values.backend.service.type }}